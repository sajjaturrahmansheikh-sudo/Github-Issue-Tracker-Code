<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Github Issue Tracker </title>
    <!-- tailwind and daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        crossorigin="anonymous" referrerpolicy="no-referrer" />




    <!-- stylesheet -->
    <link rel="stylesheet" href="./style/style.css">

<body class="bg-[#F8FAFC] min-h-screen">

    <header class="bg-base-100 shadow-sm">
        <div class="navbar  w-11/12 mx-auto">
            <div class="flex-1">
                <div class="flex items-center">
                    <img class="w-9" src="./assets/github-logo.png" alt="">
                    <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
                </div>
            </div>
            <div class="flex gap-2">
                <input id="input-search" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <div class="dropdown dropdown-end">
                    <button id="search-btn" class="btn btn-primary inline-block"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </div>


    </header>


    <main class="mt-30">
        <!-- level buttons-->

        <section class="mb-10">
            <div class="container mx-auto">

                <div class="bg-white p-10">
                    <div class="flex gap-3">

                        <button onclick="filterIssues('all',this)" class="filter-btn btn btn-primary">All</button>
                        <button onclick="filterIssues('open',this)" class="filter-btn btn btn-outline">Open</button>
                        <button onclick="filterIssues('closed',this)" class="filter-btn btn btn-outline">Close</button>

                    </div>


                </div>


            </div>

        </section>

        <!-- Issues -->
        <section>
            <div class="container mx-auto">
                <div class="bg-white p-10">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-2">
                                <div class="bg-[#ECE4FF] rounded-full p-2.5">
                                    <img class="w-12" src="./assets/Aperture.png" alt="">
                                </div>
                                <div>
                                    <h2 id="issue-count" class="text-[#1F2937] text-[20px] font-semibold">0 Issues</h2>
                                    <p class="text-[#64748B]">Track and manage your project issues</p>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2.5">
                            <span><i class="fa-solid fa-circle text-green-500"></i> Open</span>
                            <span><i class="fa-solid fa-circle text-[#A855F7]"></i> Close</span>
                        </div>


                    </div>


                </div>

            </div>

        </section>


        <!-- modal -->
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="Issue_Details.showModal()">open modal</button> -->
        <div id="modal-container">


        </div>

        <!-- Loading  -->

        <div id="loading-spinner" class="flex justify-center items-center h-[60vh] hidden">
            <span class="loading loading-spinner loading-xl"></span>
        </div>

        <!-- Issue cards -->

        <section class="bg-[#FBFBFB] p-4">
            <div class="container mx-auto">

                <div>

                    <div id="card-container" class="grid justify-center md:grid-cols-2 lg:grid-cols-4  gap-5">
